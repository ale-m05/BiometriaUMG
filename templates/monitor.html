{% extends "base.html" %}

{% block content %}

<style>
  .monitor-wrap{
    width: 100%;
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }

  .monitor-left{
    flex: 2;
    min-width: 520px;
  }

  .monitor-right{
    flex: 1;
    min-width: 320px;
    max-width: 420px;
  }

  .video-box{
    border: 1px solid #ccc;
    border-radius: 10px;
    overflow: hidden;
    background: #fff;
  }

  .video-box img{
    width: 100%;
    height: auto;
    display: block;
  }

  .card-monitor{
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 16px;
    background: #fff;
  }

  .ok { color: #0a7; font-weight: bold; }
  .no { color: #c22; font-weight: bold; }

  .rowm { margin: 8px 0; }
  .labelm { color: #666; font-size: 12px; }
  .valm { font-size: 16px; }

  @media (max-width: 1100px){
    .monitor-wrap{ flex-direction: column; }
    .monitor-left, .monitor-right{
      min-width: 100%;
      max-width: 100%;
    }
  }
</style>

<div class="monitor-wrap">

  <!-- IZQUIERDA: VIDEO -->
  <div class="monitor-left">
    <a href="{{ url_for('monitor', cam_id='cam1') }}">
  
</a>

<a href="{{ url_for('monitor', cam_id='cam2') }}">
 
</a>
    <div class="video-box">
      <img src="/video_feed/{{ cam_id }}" alt="Video en vivo">
    </div>
  </div>

  <!-- DERECHA: DATOS -->
  <div class="monitor-right">
    <h2>Último resultado</h2>
    <div class="card-monitor">
      <div id="estado" class="no mb-2">Esperando...</div>

      <div class="rowm"><div class="labelm">ID Persona</div><div id="id_persona" class="valm">-</div></div>
      <div class="rowm"><div class="labelm">Nombres</div><div id="nombre" class="valm">-</div></div>
      <div class="rowm"><div class="labelm">Apellidos</div><div id="apellido" class="valm">-</div></div>
      <div class="rowm"><div class="labelm">Carnet</div><div id="carnet" class="valm">-</div></div>
      <div class="rowm"><div class="labelm">Correo</div><div id="correo" class="valm">-</div></div>
      <div class="rowm"><div class="labelm">Distancia</div><div id="dist" class="valm">-</div></div>
      <div class="rowm"><div class="labelm">Fecha/Hora</div><div id="ts" class="valm">-</div></div>
    </div>
  </div>

</div>

<script>
async function refresh() {
  try {
    const res = await fetch("/last_match/{{ cam_id }}", { cache: "no-store" });
    const data = await res.json();

    const estado = document.getElementById("estado");
    if (data.matched) {
      estado.textContent = "RECONOCIDO";
      estado.className = "ok mb-2";
    } else {
      estado.textContent = "NO RECONOCIDO";
      estado.className = "no mb-2";
    }

    document.getElementById("id_persona").textContent = data.id_persona ?? "-";
    document.getElementById("nombre").textContent = data.nombre ?? "-";
    document.getElementById("apellido").textContent = data.apellido ?? "-";
    document.getElementById("carnet").textContent = data.carnet ?? "-";
    document.getElementById("correo").textContent = data.correo ?? "-";
    document.getElementById("dist").textContent = data.dist ?? "-";
    document.getElementById("ts").textContent = data.timestamp ?? "-";
  } catch (e) {
    console.log(e);
  }
}

setInterval(refresh, 500);
refresh();
</script>

{% endblock %}
