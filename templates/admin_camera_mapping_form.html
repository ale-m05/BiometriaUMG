{% extends "base.html" %}
{% block content %}
<h2>Nuevo Mapping</h2>
<form method="post">
<div class="mb-3">
<label class="form-label">Cámara</label>
<select name="cam_id" class="form-select" required>
<option value="">-- Seleccione cámara --</option>
{% for c in cams %}
<option value="{{ c.cam_id }}" {% if request.form.get('cam_id') == c.cam_id %}selected{% endif %}>{{ c.cam_id }} - {{ c.nombre }}</option>
{% endfor %}
</select>
</div>
<div class="mb-3">
<label class="form-label">Sede</label>
<select name="id_sede" id="id_sede" class="form-select" required>
<option value="">-- Seleccione sede --</option>
{% for s in sedes %}
<option value="{{ s.id_sede }}" {% if selected_sede == s.id_sede|string %}selected{% endif %}>{{ s.nombre }}</option>
{% endfor %}
</select>
</div>
<div class="mb-3">
<label class="form-label">Carrera</label>
<select name="carrera" id="carrera" class="form-select" required>
<option value="">-- Seleccione carrera --</option>
{% for c in carreras %}
<option value="{{ c }}" {% if selected_carrera == c %}selected{% endif %}>{{ c }}</option>
{% endfor %}
</select>
</div>
<div class="mb-3">
<!-- Sección eliminada: usamos los salones filtrados por sede+carrera -->
<div class="mb-3">
<label class="form-label">Salón</label>
<select name="id_salon" id="id_salon" class="form-select" required>
<option value="">-- Seleccione salón --</option>
{% for s in salones %}
<option value="{{ s.id_salon }}" data-id-jornada="{{ s.id_jornada if s.id_jornada is defined else '' }}" {% if request.form.get('id_salon') == s.id_salon|string %}selected{% endif %}>{{ s.nombre }}</option>
{% endfor %}
</select>
</div>
<div class="mb-3">
<label class="form-label">Jornada</label>
<div id="id_jornada_display" class="form-control" style="background:#fff">{% if request.form.get('id_jornada') %}{{ request.form.get('id_jornada') }}{% else %}-- Automática desde salón --{% endif %}</div>
<input type="hidden" name="id_jornada" id="id_jornada" value="{{ request.form.get('id_jornada','') }}">
</div>
<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" value="1" name="activo" id="activo" checked>
<label class="form-check-label" for="activo">Activo</label>
</div>
<button class="btn btn-primary" type="submit">Guardar</button>
</form>
<script>
async function fetchCarreras() {
    const sede = document.getElementById('id_sede').value;
    const carreraSelect = document.getElementById('carrera');
    carreraSelect.innerHTML = '<option value="">-- Seleccione carrera --</option>';
    if (!sede) return;
    const res = await fetch(`/admin/api/carreras_por_sede?id_sede=${encodeURIComponent(sede)}`);
    const data = await res.json();
    for (const carrera of data.carreras) {
        const option = document.createElement('option');
        option.value = carrera;
        option.textContent = carrera;
        carreraSelect.appendChild(option);
    }
}
async function fetchSalones() {
    const sede = document.getElementById('id_sede').value;
    const carrera = document.getElementById('carrera').value;
    const salonSelect = document.getElementById('id_salon');
    salonSelect.innerHTML = '<option value="">-- Seleccione salón --</option>';
    if (!sede || !carrera) return;
    const res = await fetch(`/admin/api/salones_por_sede_carrera?id_sede=${encodeURIComponent(sede)}&carrera=${encodeURIComponent(carrera)}`);
    const data = await res.json();
    for (const s of data.salones) {
        const option = document.createElement('option');
        option.value = s.id_salon;
        option.textContent = s.nombre + (s.jornada_nombre ? (' - ' + s.jornada_nombre) : '');
        option.dataset.idJornada = s.id_jornada || '';
        option.dataset.jornadaNombre = s.jornada_nombre || '';
        salonSelect.appendChild(option);
    }
}

document.getElementById('id_sede').addEventListener('change', fetchCarreras);
document.getElementById('carrera').addEventListener('change', fetchSalones);

// Cuando se escoge un salón, auto-seleccionar la jornada asociada si existe
document.getElementById('id_salon').addEventListener('change', function() {
    const sel = this.options[this.selectedIndex];
    const idJ = sel ? sel.dataset.idJornada : '';
    const jNombre = sel ? sel.dataset.jornadaNombre : '';
    const jornadaHidden = document.getElementById('id_jornada');
    const jornadaDisplay = document.getElementById('id_jornada_display');
    jornadaHidden.value = idJ || '';
    jornadaDisplay.textContent = jNombre ? jNombre : '-- Automática desde salón --';
});
</script>
{% endblock %}
