{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="bi bi-plus-circle"></i> Crear Nuevo Curso
                    </h4>
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('admin_crear_curso') }}">
                        <div class="mb-3">
                            <label for="nombre" class="form-label"><strong>Nombre del Curso *</strong></label>
                            <input type="text" class="form-control" id="nombre" name="nombre" 
                                   value="{{ form_data.get('nombre', '') }}" required>
                            <small class="form-text text-muted">Ej: Programación I, Base de Datos II</small>
                        </div>

                        <div class="mb-3">
                            <label for="codigo" class="form-label"><strong>Código del Curso *</strong></label>
                            <input type="text" class="form-control" id="codigo" name="codigo" 
                                   value="{{ form_data.get('codigo', '') }}" required>
                            <small class="form-text text-muted">Ej: SIS101, BDD102</small>
                        </div>

                        <div class="mb-3">
                            <label for="creditos" class="form-label"><strong>Créditos</strong></label>
                            <input type="number" class="form-control" id="creditos" name="creditos" 
                                   value="{{ form_data.get('creditos', '0') }}" min="0">
                            <small class="form-text text-muted">Cantidad de créditos del curso</small>
                        </div>

                        <div class="mb-3">
                            <label for="id_sede_carrera" class="form-label"><strong>Sede - Carrera *</strong></label>
                            <select class="form-control" id="id_sede_carrera" name="id_sede_carrera" required>
                                <option value="">-- Seleccionar --</option>
                                {% for opcion in sede_carrera_options %}
                                    <option value="{{ opcion.id_sede_carrera }}" 
                                            {% if form_data.get('id_sede_carrera')|string == opcion.id_sede_carrera|string %}selected{% endif %}>
                                        {{ opcion.display_name }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> Guardar Curso
                            </button>
                            <a href="{{ url_for('admin_listar_cursos') }}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
